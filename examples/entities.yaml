apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: cuentas-api
  title: Cuentas REST API v2
  description: API REST para gestión de cuentas bancarias — OpenAPI 3.1
  tags: [rest, openapi, core, produccion]
spec:
  type: openapi
  lifecycle: production
  owner: core-banking
  system: core-banking-platform
  definition: |
    openapi: "3.1.0"
    info:
      title: Cuentas API
      version: "2.3.0"
      description: API de gestión de cuentas bancarias Banamex
      contact:
        name: Core Banking Team
        email: core-banking@banamex.com
    servers:
      - url: https://api.banamex.com/v2/cuentas
    paths:
      /cuentas/{clabe}:
        get:
          summary: Consultar cuenta por CLABE
          tags: [Cuentas]
          parameters:
            - name: clabe
              in: path
              required: true
              schema:
                type: string
                pattern: '^\d{18}$'
          responses:
            '200':
              description: Cuenta encontrada
            '404':
              description: Cuenta no encontrada
            '403':
              description: Sin autorización
      /cuentas:
        post:
          summary: Apertura de nueva cuenta
          tags: [Cuentas]
          responses:
            '201':
              description: Cuenta creada exitosamente
        get:
          summary: Listar cuentas del cliente
          tags: [Cuentas]
          responses:
            '200':
              description: Lista de cuentas
      /cuentas/{clabe}/saldo:
        get:
          summary: Consultar saldo en tiempo real
          tags: [Cuentas]
          parameters:
            - name: clabe
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Saldo actual
