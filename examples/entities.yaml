apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: onboarding-api
  title: Onboarding Digital API v1
  description: API de alta digital de nuevos clientes — eKYC, validación INE/CURP y apertura express vía Apigee
  annotations:
    apigee.googleapis.com/proxy-name: onboarding-proxy
    apigee.googleapis.com/environment: production
    apigee.googleapis.com/organization: banamex
  tags: [rest, openapi, onboarding, ekyc, cnbv, apigee, produccion]
spec:
  type: openapi
  lifecycle: production
  owner: banca-digital
  system: canales-digitales
  definition: |
    openapi: "3.1.0"
    info:
      title: Onboarding Digital API
      version: "1.0.0"
      description: API de alta digital Banamex — eKYC y apertura express
    servers:
      - url: https://api.banamex.com/v1/onboarding
    paths:
      /solicitudes:
        post:
          summary: Iniciar proceso de alta digital
          tags: [Onboarding]
          responses:
            '201':
              description: Proceso de alta iniciado
      /solicitudes/{id}/kyc:
        post:
          summary: Enviar documentos eKYC
          tags: [KYC]
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Documentos validados
      /solicitudes/{id}/biometria:
        post:
          summary: Captura biométrica facial
          tags: [KYC]
          responses:
            '200':
              description: Biométrica validada exitosamente
      /solicitudes/{id}/cuenta:
        post:
          summary: Activar cuenta express
          tags: [Onboarding]
          responses:
            '201':
              description: Cuenta activada exitosamente