apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: open-banking-api
  title: Open Banking API v1 — CNBV Open Finance
  description: API regulada CNBV Open Finance — datos de cuentas y movimientos para terceros autorizados (TPPs)
  annotations:
    apigee.googleapis.com/proxy-name: open-banking-proxy
    apigee.googleapis.com/environment: production
    apigee.googleapis.com/organization: banamex
  tags: [rest, openapi, openfinance, cnbv, apigee, externo, produccion]
  links:
    - url: https://developers.banamex.com/open-banking
      title: Developer Portal
      icon: dashboard
spec:
  type: openapi
  lifecycle: production
  owner: plataforma-ti
  system: api-management-platform
  definition: |
    openapi: "3.1.0"
    info:
      title: Open Banking API — Banamex
      version: "1.0.0"
      description: "API Open Finance regulada CNBV — acceso a cuentas por TPPs autorizados"
      contact:
        name: API Management Team
        email: api-management@banamex.com
    servers:
      - url: https://openbanking.banamex.com/v1
    paths:
      /accounts:
        get:
          summary: Listar cuentas del cliente (consentimiento requerido)
          tags: [Accounts]
          security:
            - oauth2: [accounts:read]
          responses:
            '200':
              description: Lista de cuentas con consentimiento activo
            '401':
              description: Consentimiento no otorgado
      /accounts/{accountId}/transactions:
        get:
          summary: Movimientos de cuenta
          tags: [Transactions]
          parameters:
            - name: accountId
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Historial de movimientos
      /consents:
        post:
          summary: Crear consentimiento Open Finance
          tags: [Consents]
          responses:
            '201':
              description: Consentimiento creado
